title: Donation Messages
tabs:
  settings:
    display: Settings
    sections:
      -
        fields:
          -
            handle: collect_billing_address
            field:
              type: toggle
              display: 'Collect Billing Address'
              instructions: 'Require billing address on Stripe Checkout. Needed for Gift Aid / HMRC compliance.'
              default: false
              width: 50
          -
            handle: gift_aid_enabled
            field:
              type: toggle
              display: 'Enable Gift Aid'
              instructions: 'Show a Gift Aid declaration checkbox on the donation form.'
              default: false
              width: 50
          -
            handle: gift_aid_label
            field:
              type: text
              display: 'Gift Aid Label'
              instructions: 'The label shown next to the Gift Aid checkbox.'
              default: 'Boost your donation by 25% with Gift Aid'
              if:
                gift_aid_enabled: 'equals true'
          -
            handle: donor_portal_enabled
            field:
              type: toggle
              display: 'Enable Donor Portal'
              instructions: 'Allow donors to view their donation history via a magic link.'
              default: true
              width: 50
          -
            handle: donor_can_cancel
            field:
              type: toggle
              display: 'Donors Can Cancel'
              instructions: 'Allow donors to cancel their own subscriptions from the portal.'
              default: true
              width: 50
  thank_you_single:
    display: 'Thank You: Single'
    sections:
      -
        fields:
          -
            handle: single_heading
            field:
              type: text
              display: Heading
              instructions: 'Heading shown on the thank you page after a single donation.'
              default: 'Thank you for your donation!'
          -
            handle: single_message
            field:
              type: textarea
              display: Message
              instructions: 'Message shown on the thank you page after a single donation.'
              default: 'Your generous contribution makes a real difference.'
          -
            handle: single_cta_text
            field:
              type: text
              display: Button Text
              default: 'Return home'
              width: 50
          -
            handle: single_cta_url
            field:
              type: text
              display: Button URL
              default: '/'
              width: 50
  thank_you_recurring:
    display: 'Thank You: Recurring'
    sections:
      -
        fields:
          -
            handle: recurring_heading
            field:
              type: text
              display: Heading
              instructions: 'Heading shown on the thank you page after a recurring donation.'
              default: 'Thank you for your monthly donation!'
          -
            handle: recurring_message
            field:
              type: textarea
              display: Message
              instructions: 'Message shown on the thank you page after a recurring donation.'
              default: 'Your ongoing support helps us plan for the future.'
          -
            handle: recurring_cta_text
            field:
              type: text
              display: Button Text
              default: 'Return home'
              width: 50
          -
            handle: recurring_cta_url
            field:
              type: text
              display: Button URL
              default: '/'
              width: 50
  email_branding:
    display: 'Email Branding'
    sections:
      -
        fields:
          -
            handle: email_logo
            field:
              type: assets
              display: Logo
              instructions: 'Logo image for emails (recommended: 200px wide, PNG or SVG).'
              max_files: 1
              container: assets
          -
            handle: email_org_name
            field:
              type: text
              display: 'Organisation Name'
              instructions: 'Shown in the email header when no logo is set, and in the footer.'
              default: ''
          -
            handle: email_accent_color
            field:
              type: color
              display: 'Accent Colour'
              instructions: 'Used for the header background, buttons, and highlights.'
              default: '#4f46e5'
          -
            handle: email_greeting
            field:
              type: text
              display: Greeting
              instructions: 'The greeting line used in all emails. Available placeholders: {first_name}, {last_name}, {name}, {email}'
              default: 'Hi {first_name},'
  email_single:
    display: 'Email: Donation'
    sections:
      -
        fields:
          -
            handle: single_email_subject
            field:
              type: text
              display: Subject
              default: 'Thank You for Your Donation'
              width: 50
          -
            handle: single_email_heading
            field:
              type: text
              display: Heading
              default: 'Thank You for Your Donation'
              width: 50
          -
            handle: single_email_body
            field:
              type: textarea
              display: Body
              instructions: 'The main message sent after a single donation is completed.'
              default: 'Thank you for your generous donation. Your contribution makes a real difference and we are truly grateful for your support.'
  email_recurring:
    display: 'Email: Recurring'
    sections:
      -
        fields:
          -
            handle: recurring_email_subject
            field:
              type: text
              display: Subject
              default: 'Thank You for Your Monthly Donation'
              width: 50
          -
            handle: recurring_email_heading
            field:
              type: text
              display: Heading
              default: 'Thank You for Your Monthly Donation'
              width: 50
          -
            handle: recurring_email_body
            field:
              type: textarea
              display: Body
              instructions: 'The main message sent after a recurring donation is set up.'
              default: 'Thank you for setting up a recurring donation. Your ongoing support helps us plan for the future and makes a lasting difference.'
  email_paused:
    display: 'Email: Paused'
    sections:
      -
        fields:
          -
            handle: paused_email_subject
            field:
              type: text
              display: Subject
              default: 'Thank You for Your Support'
              width: 50
          -
            handle: paused_email_heading
            field:
              type: text
              display: Heading
              default: 'Thank You for Your Support'
              width: 50
          -
            handle: paused_email_body
            field:
              type: textarea
              display: Body
              instructions: 'The main message sent when a subscription is paused.'
              default: 'We wanted to reach out to let you know that your recurring donation has been paused. Thank you so much for the support you have given us. Your generosity has made a real difference, and we are truly grateful for every contribution. If you ever wish to resume your donation, you are welcome to do so at any time.'
  email_resumed:
    display: 'Email: Resumed'
    sections:
      -
        fields:
          -
            handle: resumed_email_subject
            field:
              type: text
              display: Subject
              default: 'Your Donation Has Been Resumed'
              width: 50
          -
            handle: resumed_email_heading
            field:
              type: text
              display: Heading
              default: 'Your Donation Has Been Resumed'
              width: 50
          -
            handle: resumed_email_body
            field:
              type: textarea
              display: Body
              instructions: 'The main message sent when a subscription is resumed.'
              default: 'Great news! Your recurring donation has been resumed and payments will continue as normal. Thank you for your continued generosity. Your ongoing support makes a real difference.'
