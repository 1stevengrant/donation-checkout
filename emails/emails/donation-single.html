---
preheader: Thank you for your donation
---

<x-main>
  <h1 class="m-0 mb-6 text-2xl/8 text-slate-900 font-semibold">
    {{ $heading }}
  </h1>

  <p class="m-0 mb-4 text-base/6 text-slate-600">
    {{ $greeting }}
  </p>

  <p class="m-0 mb-6 text-base/6 text-slate-600">
    {{ $body }}
  </p>

  <table class="w-full rounded-lg bg-slate-50 [border:1px_solid_theme(colors.slate.200)]" role="presentation">
    <tr>
      <td class="px-6 py-4">
        <p class="m-0 text-sm/5 text-slate-500">Amount</p>
        <p class="m-0 text-lg font-semibold text-slate-900">{{ strtoupper($currency) }} {{ number_format($amount, 2) }}</p>
      </td>
    </tr>
  </table>

  <div class="h-6"></div>

  <table class="w-full [border-top:1px_solid_theme(colors.slate.200)]" role="presentation">
    <tr>
      <td class="pt-6">
        <p class="m-0 text-base/6 text-slate-600">
          With gratitude,
          <br>
          <span class="font-semibold text-slate-900">The Team</span>
        </p>
      </td>
    </tr>
  </table>
</x-main>
